<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 简洁的珊瑚橙色渐变 -->
    <linearGradient id="coral-simple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35" />
      <stop offset="100%" stop-color="#FF8C42" />
    </linearGradient>
    
    <!-- 深海蓝 -->
    <linearGradient id="ocean-simple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0077B6" />
      <stop offset="100%" stop-color="#023E8A" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="90" fill="url(#ocean-simple)" opacity="0.1"/>
  
  <!-- 简洁的珊瑚主体 -->
  <path d="M100,50 Q120,65 100,80 Q80,65 100,50" fill="url(#coral-simple)"/>
  <path d="M100,80 Q125,90 110,110 Q95,125 90,100 Q85,80 100,80" fill="url(#coral-simple)" opacity="0.9"/>
  <path d="M100,80 Q75,90 90,110 Q105,125 110,100 Q115,80 100,80" fill="url(#coral-simple)" opacity="0.8"/>
  <path d="M100,110 Q115,135 85,135 Q70,110 100,110" fill="#FF8C42" opacity="0.7"/>
  
  <!-- 装饰元素 -->
  <circle cx="85" cy="70" r="3" fill="#FFD166" opacity="0.8"/>
  <circle cx="115" cy="70" r="3" fill="#FFD166" opacity="0.8"/>
  <circle cx="100" cy="90" r="4" fill="#FFD166" opacity="0.9"/>
  
  <!-- 文字 -->
  <text x="100" y="170" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FF6B35">CoralUI</text>
</svg>