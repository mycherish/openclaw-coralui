<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 现代珊瑚渐变 -->
    <linearGradient id="coral-modern" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35" />
      <stop offset="50%" stop-color="#FF8C42" />
      <stop offset="100%" stop-color="#FFA06B" />
    </linearGradient>
    
    <!-- 现代背景渐变 -->
    <linearGradient id="bg-modern" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0077B6" />
      <stop offset="100%" stop-color="#023E8A" />
    </linearGradient>
  </defs>
  
  <!-- 现代背景 -->
  <rect width="200" height="200" fill="url(#bg-modern)" opacity="0.05"/>
  
  <!-- 现代珊瑚形状 -->
  <path d="M100,40 L120,60 L100,80 L80,60 L100,40" fill="url(#coral-modern)" opacity="0.9"/>
  <path d="M100,80 L130,100 L100,120 L70,100 L100,80" fill="url(#coral-modern)" opacity="0.8"/>
  <path d="M100,120 L110,140 L100,160 L90,140 L100,120" fill="url(#coral-modern)" opacity="0.7"/>
  
  <!-- 装饰点 -->
  <circle cx="85" cy="65" r="3" fill="#FFD166"/>
  <circle cx="115" cy="65" r="3" fill="#FFD166"/>
  <circle cx="100" cy="85" r="4" fill="#FFD166"/>
  <circle cx="75" cy="95" r="2" fill="#FFD166"/>
  <circle cx="125" cy="95" r="2" fill="#FFD166"/>
  
  <!-- 现代文字 -->
  <text x="100" y="180" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FF6B35">CoralUI</text>
</svg>